<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineTrack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        /* NAVBAR */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
        }

        .logo span {
            color: #e94560;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #e94560;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #333;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 13px;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: #c73652;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-text h2 {
            font-size: 36px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .hero-text h2 span {
            color: #e94560;
        }

        .hero-text p {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .btn-add-hero {
            padding: 12px 28px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-add-hero:hover {
            background: #c73652;
            transform: translateY(-2px);
        }

        .hero-stats {
            display: flex;
            gap: 32px;
        }

        .stat {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #e94560;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* FILTER */
        .content {
            padding: 32px 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #e94560;
            color: white;
            border-color: #e94560;
        }

        /* GRID */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .movie-poster {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
        }

        .movie-body {
            padding: 14px;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.sudah {
            background: #e8f8f0;
            color: #2ecc71;
        }

        .badge.ingin {
            background: #fff8e8;
            color: #f39c12;
        }

        .badge.sedang {
            background: #e8f0ff;
            color: #3498db;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            border-top: 1px solid #f5f5f5;
        }

        .btn-edit {
            flex: 1;
            padding: 6px;
            background: #e8f0ff;
            color: #3498db;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: #3498db;
            color: white;
        }

        .btn-delete {
            flex: 1;
            padding: 6px;
            background: #fff0f2;
            color: #e94560;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #e94560;
            color: white;
        }

        .empty {
            grid-column: 1/-1;
            text-align: center;
            color: #aaa;
            padding: 60px 0;
            font-size: 15px;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            padding: 32px;
            border-radius: 20px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .modal h3 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .modal label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }

        .modal input,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 14px;
            color: #333;
            outline: none;
            background: #fafafa;
            transition: border 0.2s;
        }

        .modal input:focus,
        .modal select:focus {
            border-color: #e94560;
            background: white;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-save {
            flex: 1;
            padding: 11px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: #c73652;
        }

        .btn-cancel {
            flex: 1;
            padding: 11px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel:hover {
            background: #eee;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="nav-left">
            <div class="logo">Cine<span>Track</span></div>
            <div class="nav-links">
                <a href="#" class="active">Movie</a>
                <a href="#">Wishlist</a>
                <a href="#">Sudah Ditonton</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="user-badge">
                <div class="avatar" id="avatarText">U</div>
                <span id="welcomeText">User</span>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
        <div class="hero-text">
            <h2>Kelola Koleksi <span>Film</span><br>Favoritmu</h2>
            <p>Catat, track, dan kelola semua film yang ingin kamu tonton</p>
            <button class="btn-add-hero" onclick="openModal()">+ Tambah Film</button>
        </div>
        <div class="hero-stats">
            <div class="stat">
                <div class="stat-number" id="totalFilm">0</div>
                <div class="stat-label">Total Film</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalSudah">0</div>
                <div class="stat-label">Sudah Ditonton</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalIngin">0</div>
                <div class="stat-label">Ingin Ditonton</div>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="section-title">Koleksi Film Saya</div>
        <div class="filters" id="filterButtons">
            <button class="filter-btn active" onclick="filterMovies('semua', this)">Semua</button>
            <button class="filter-btn" onclick="filterMovies('Sudah Ditonton', this)">Sudah Ditonton</button>
            <button class="filter-btn" onclick="filterMovies('Sedang Ditonton', this)">Sedang Ditonton</button>
            <button class="filter-btn" onclick="filterMovies('Ingin Ditonton', this)">Ingin Ditonton</button>
            <button class="filter-btn" onclick="filterMovies('Sci-Fi', this)">Sci-Fi</button>
            <button class="filter-btn" onclick="filterMovies('Drama', this)">Drama</button>
            <button class="filter-btn" onclick="filterMovies('Action', this)">Action</button>
            <button class="filter-btn" onclick="filterMovies('Thriller', this)">Thriller</button>
            <button class="filter-btn" onclick="filterMovies('Horror', this)">Horror</button>
            <button class="filter-btn" onclick="filterMovies('Romance', this)">Romance</button>
            <button class="filter-btn" onclick="filterMovies('Animasi', this)">Animasi</button>
            <button class="filter-btn" onclick="filterMovies('Komedi', this)">Komedi</button>
            <button class="filter-btn" onclick="filterMovies('Dokumenter', this)">Dokumenter</button>
        </div>
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">🎬 Tambah Film</h3>
            <label>Judul Film</label>
            <input type="text" id="inputTitle" placeholder="Contoh: Interstellar" />
            <label>Genre</label>
            <select id="inputGenre">
                <option value="Action">Action</option>
                <option value="Animasi">Animasi</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
                <option value="Komedi">Komedi</option>
                <option value="Romance">Romance</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Thriller">Thriller</option>
                <option value="Dokumenter">Dokumenter</option>
            </select>
            <label>Sutradara</label>
            <input type="text" id="inputDirector" placeholder="Contoh: Christopher Nolan" />
            <label>Tahun Rilis</label>
            <input type="number" id="inputYear" placeholder="Contoh: 2014" />
            <label>Status Tonton</label>
            <select id="inputStatus">
                <option value="Ingin Ditonton">Ingin Ditonton</option>
                <option value="Sedang Ditonton">Sedang Ditonton</option>
                <option value="Sudah Ditonton">Sudah Ditonton</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn-save" onclick="saveMovie()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';
        let allMovies = [];
        let editingId = null;

        const token = localStorage.getItem('accessToken');
        if (!token) window.location.href = 'index.html';

        const username = localStorage.getItem('username') || 'User';
        document.getElementById('welcomeText').textContent = username;
        document.getElementById('avatarText').textContent = username.charAt(0).toUpperCase();

        const genreImage = {
            'Action': 'https://plus.unsplash.com/premium_photo-1682097259793-fe8ce9ac11bc?w=400&q=80',
            'Animasi': 'https://images.unsplash.com/photo-1671639903944-dc3a999000b9?w=400&q=80',
            'Drama': 'https://plus.unsplash.com/premium_photo-1683219368393-96002fb69cd6?w=400&q=80',
            'Horror': 'https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=400&q=80',
            'Komedi': 'https://images.unsplash.com/photo-1587504218914-44346092cef8?w=400&q=80',
            'Romance': 'https://images.unsplash.com/reserve/Af0sF2OS5S5gatqrKzVP_Silhoutte.jpg?w=400&q=80',
            'Sci-Fi': 'https://plus.unsplash.com/premium_photo-1682124752476-40db22034a58?w=400&q=80',
            'Thriller': 'https://images.unsplash.com/photo-1482424917728-d82d29662023?w=400&q=80',
            'Dokumenter': 'https://images.unsplash.com/photo-1543906965-f9520aa2ed8a?w=400&q=80',
        };
        const posterColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4',
            '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'
        ];

        async function fetchMovies() {
            try {
                const res = await fetch(`${API}/movies`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401 || res.status === 403) {
                    window.location.href = 'index.html';
                    return;
                }
                allMovies = await res.json();
                updateStats(allMovies);
                renderMovies(allMovies);
            } catch (err) { console.error(err); }
        }

        function updateStats(movies) {
            document.getElementById('totalFilm').textContent = movies.length;
            document.getElementById('totalSudah').textContent =
                movies.filter(m => m.status === 'Sudah Ditonton').length;
            document.getElementById('totalIngin').textContent =
                movies.filter(m => m.status === 'Ingin Ditonton').length;
        }

        function filterMovies(filter, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (filter === 'semua') return renderMovies(allMovies);
            const filtered = allMovies.filter(m => m.status === filter || m.genre === filter);
            renderMovies(filtered);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            if (movies.length === 0) {
                grid.innerHTML = '<div class="empty">🎬 Belum ada film. Tambahkan film pertamamu!</div>';
                return;
            }
            grid.innerHTML = movies.map((m, i) => {
                const color = posterColors[i % posterColors.length];
                const img = genreImage[m.genre] || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&q=80';
                const badgeClass = m.status === 'Sudah Ditonton' ? 'sudah'
                    : m.status === 'Sedang Ditonton' ? 'sedang' : 'ingin';
                return `
          <div class="movie-card">
           <div class="movie-poster" style="background-image: url('${img}'); background-size: cover; background-position: center;">
            <div style="position:absolute;inset:0;background:rgba(0,0,0,0.3);border-radius:0"></div>
            <span style="position:relative;font-size:13px;font-weight:700;color:white;padding:4px 8px;background:rgba(0,0,0,0.5);border-radius:4px">${m.genre}</span>
            </div>
            <div class="movie-body">
              <div class="movie-title">${m.title}</div>
              <div class="movie-meta">🎬 ${m.director} · ${m.year}</div>
              <div class="movie-meta">🎭 ${m.genre}</div>
              <span class="badge ${badgeClass}">${m.status}</span>
            </div>
            <div class="card-actions">
              <button class="btn-edit" onclick="openEdit(${m.id}, '${m.title}', '${m.genre}', '${m.director}', ${m.year}, '${m.status}')">Edit</button>
              <button class="btn-delete" onclick="deleteMovie(${m.id})">Hapus</button>
            </div>
          </div>
        `;
            }).join('');
        }

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '🎬 Tambah Film';
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputGenre').value = '';
            document.getElementById('inputDirector').value = '';
            document.getElementById('inputYear').value = '';
            document.getElementById('inputStatus').value = 'Ingin Ditonton';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function openEdit(id, title, genre, director, year, status) {
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Film';
            document.getElementById('inputTitle').value = title;
            document.getElementById('inputGenre').value = genre;
            document.getElementById('inputDirector').value = director;
            document.getElementById('inputYear').value = year;
            document.getElementById('inputStatus').value = status;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function saveMovie() {
            const body = {
                title: document.getElementById('inputTitle').value,
                genre: document.getElementById('inputGenre').value,
                director: document.getElementById('inputDirector').value,
                year: parseInt(document.getElementById('inputYear').value),
                status: document.getElementById('inputStatus').value,
            };
            if (!body.title || !body.genre || !body.director || !body.year) {
                alert('Semua field wajib diisi!'); return;
            }
            const url = editingId ? `${API}/movies/${editingId}` : `${API}/movies`;
            const method = editingId ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('Gagal menyimpan');
                closeModal();
                fetchMovies();
            } catch (err) { alert(err.message); }
        }

        async function deleteMovie(id) {
            if (!confirm('Yakin ingin menghapus film ini?')) return;
            try {
                await fetch(`${API}/movies/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchMovies();
            } catch (err) { alert('Gagal menghapus'); }
        }

        function logout() {
            const refreshToken = localStorage.getItem('refreshToken');
            fetch(`${API}/auth/logout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: refreshToken })
            });
            localStorage.clear();
            window.location.href = 'index.html';
        }

        fetchMovies();
    </script>
</body>

</html>
