<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CineTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a2e;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 400px;
      border: 1px solid #e94560;
    }
    h1 { text-align: center; color: #e94560; margin-bottom: 8px; font-size: 28px; }
    p.subtitle { text-align: center; color: #888; margin-bottom: 28px; font-size: 14px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #ccc; }
    input {
      width: 100%; padding: 10px 14px;
      background: #16213e;
      border: 1px solid #333; border-radius: 8px;
      font-size: 14px; margin-bottom: 18px;
      color: white; outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #e94560; }
    button {
      width: 100%; padding: 12px;
      background: #e94560; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #c73652; }
    .link { text-align: center; margin-top: 18px; font-size: 14px; color: #888; }
    .link a { color: #e94560; font-weight: 600; text-decoration: none; }
    .error {
      background: #2d0a0a; color: #e94560;
      padding: 10px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; display: none;
      border: 1px solid #e94560;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎬 CineTrack</h1>
    <p class="subtitle">Login untuk kelola koleksi filmmu</p>
    <div class="error" id="errorMsg"></div>
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password" />
    <button onclick="login()">Login</button>
    <div class="link">Belum punya akun? <a href="register.html">Daftar di sini</a></div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Username dan password wajib diisi';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('username', username);
        window.location.href = 'movies.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
