<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - CineTrack</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #141414;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .bg {
      position: fixed; inset: 0;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
        url('https://plus.unsplash.com/premium_photo-1710522706751-c2f0c76cc5fd?w=1200&q=80');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 48px 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      font-size: 28px; font-weight: 800;
      color: white; margin-bottom: 8px;
    }
    .logo span { color: #e94560; }
    p.subtitle {
      text-align: center; color: #aaa;
      margin-bottom: 32px; font-size: 14px;
    }
    label {
      display: block; margin-bottom: 6px;
      font-size: 13px; font-weight: 600; color: #ccc;
    }
    .input-wrapper {
      position: relative; margin-bottom: 18px;
    }
    input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 14px; color: white; outline: none;
      transition: border 0.2s;
    }
    input::placeholder { color: #555; }
    input:focus { border-color: #e94560; background: rgba(255,255,255,0.12); }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: #aaa;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: white; }
    button {
      width: 100%; padding: 13px;
      background: #e94560; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(233,69,96,0.4);
      margin-top: 4px;
    }
    button:hover { background: #c73652; transform: translateY(-1px); }
    .link {
      text-align: center; margin-top: 20px;
      font-size: 14px; color: #888;
    }
    .link a { color: #e94560; font-weight: 600; text-decoration: none; }
    .error {
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.4);
      color: #e94560; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .success {
      background: rgba(46,204,113,0.15);
      border: 1px solid rgba(46,204,113,0.4);
      color: #2ecc71; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="logo">🎬 Cine<span>Track</span></div>
    <p class="subtitle">Buat akun baru</p>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <label>Username</label>
    <div class="input-wrapper">
      <input type="text" id="username" placeholder="Masukkan username" />
    </div>
    <label>Password</label>
    <div class="input-wrapper">
      <input type="password" id="password" placeholder="Masukkan password" />
      <span class="toggle-pw" onclick="togglePw('password', 'icon1')" id="icon1">
        <i class="fa-regular fa-eye-slash"></i>
      </span>
    </div>
    <label>Konfirmasi Password</label>
    <div class="input-wrapper">
      <input type="password" id="confirmPassword" placeholder="Ulangi password" />
      <span class="toggle-pw" onclick="togglePw('confirmPassword', 'icon2')" id="icon2">
        <i class="fa-regular fa-eye-slash"></i>
      </span>
    </div>
    <button onclick="register()">Daftar</button>
    <div class="link">Sudah punya akun? <a href="index.html">Login di sini</a></div>
  </div>

  <script>
    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<i class="fa-regular fa-eye"></i>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
      }
    }

    async function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!username || !password || !confirmPassword) {
        errorMsg.textContent = 'Semua field wajib diisi';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Password tidak cocok';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        successMsg.textContent = 'Registrasi berhasil! Silakan login.';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 2000);
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
